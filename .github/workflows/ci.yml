name: CI 

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    frontend:
        runs-on: ubuntu-lates
        steps:
            - name: Checkout code
              uses: actions/checkout/@v4
            - name: Use Node.js
              uses: action.setup/-node@v4
              with:
                node-version: '20.x'
            - name: Install dependencies
              run: npm install 
            - name: Run Eslint (warn only)
              run : npm run lint || true
            - name: Built frontend
              run: npm run build
    
    backend-docker: 
        runs-on: ubuntu-latest
        needs: frontend
        defaults: 
            run:
                working-directory: MealMatch/backend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Build backend Docker image
              run: docker build -t backend-test .